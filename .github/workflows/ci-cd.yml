name: Production CI/CD Workflow Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-validation:
    name: Execute Backend Engine Verification
    runs-on: ubuntu-latest

    steps:
    - name: Clone Repository Streams
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Provision Core System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Code Quality & Syntax Linting (Flake8)
      run: |
        # Fail build immediately if there are syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Execute Automated Unit Test Suites (Pytest)
      env:
        COHERE_API_KEY: "mock_test_key_for_pipeline_compliance"
        APP_ENV: "testing"
      run: |
        # Run isolated unit tests for processing logic and model connectors
        cd backend
        pytest -v

  frontend-validation:
    name: Execute Frontend Client Verification
    runs-on: ubuntu-latest
    needs: backend-validation # Prevent client bundling if core api contracts fail

    steps:
    - name: Clone Repository Streams
      uses: actions/checkout@v4

    - name: Initialize Node.js Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Project Dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps

    - name: Build Production Ingestion Bundle
      env:
        CI: true # Enforce strict compilation warnings as hard errors
      run: |
        cd frontend
        npm run build